extends: default

rules:
  line-length:
    max: 120
    level: warning
  indentation:
    spaces: 2
    indent-sequences: true
  document-start:
    present: true
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  empty-lines:
    max: 2
    max-start: 0
    max-end: 0