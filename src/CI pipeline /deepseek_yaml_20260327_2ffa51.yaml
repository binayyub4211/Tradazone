name: Lint CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.sh'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.sh'

jobs:
  lint:
    name: Lint CI Pipeline Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install yamllint shellcheck-py actionlint

      - name: Lint YAML files
        run: |
          echo "::group::YAML Linting"
          yamllint -c .yamllint.yml .github/workflows/ scripts/
          echo "::endgroup::"

      - name: Lint shell scripts
        run: |
          echo "::group::Shell Script Linting"
          find scripts/ -name "*.sh" -type f -exec shellcheck {} \;
          echo "::endgroup::"

      - name: Lint GitHub Actions
        run: |
          echo "::group::GitHub Actions Linting"
          actionlint -color
          echo "::endgroup::"

      - name: Validate workflow syntax
        run: |
          echo "::group::Workflow Syntax Validation"
          for file in .github/workflows/*.yml; do
            python -c "import yaml; yaml.safe_load(open('$file'))"
          done
          echo "::endgroup::"